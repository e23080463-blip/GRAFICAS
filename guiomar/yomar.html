<!DOCTYPE HTML>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reporte Estadístico Consolidado</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #e9ecef; margin: 0; padding: 20px; }
        .contenedor-principal { max-width: 1200px; margin: auto; }
        .tarjeta-reporte { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 40px; 
            overflow: hidden;
            border: 1px solid #dee2e6;
        }
        .encabezado { background: #2c3e50; color: white; padding: 15px 25px; }
        .encabezado h2 { margin: 0; font-size: 1.5rem; }
        .marco-reporte { width: 100%; height: 750px; border: none; display: block; }
    </style>
</head>
<body>

    <div class="contenedor-principal">
        <div class="tarjeta-reporte">
            <div class="encabezado"><h2>1. Análisis de Correlación (Dispersión)</h2></div>
            <iframe class="marco-reporte" src="grafica de dispersion - copia.html"></iframe>
        </div>

        <div class="tarjeta-reporte">
            <div class="encabezado"><h2>2. Estadísticas Descriptivas (Gráfico de Barras)</h2></div>
            <iframe class="marco-reporte" src="graficadebarras - copia.html"></iframe>
        </div>

        <div class="tarjeta-reporte">
            <div class="encabezado"><h2>3. Frecuencias y Distribución (Gráfico de Pastel)</h2></div>
            <iframe class="marco-reporte" src="grafico de PASTEL - copia.html"></iframe>
        </div>
    </div>

</body>
</html>
